          - heading "Plans for Project Glasswing" [level=2] [ref=e260]
          - paragraph
          - paragraph [ref=e261]: Today’s announcement is the beginning of a longer-term effort. To be successful, it will require broad involvement from across the technology industry and beyond.
          - paragraph [ref=e262]: Project Glasswing partners will receive access to Claude Mythos Preview to find and fix vulnerabilities or weaknesses in their foundational systems—systems that represent a very large portion of the world’s shared cyberattack surface. We anticipate this work will focus on tasks like local vulnerability detection, black box testing of binaries, securing endpoints, and penetration testing of systems.
          - paragraph [ref=e263]: Anthropic’s commitment of $100M in model usage credits to Project Glasswing and additional participants will cover substantial usage throughout this research preview. Afterward, Claude Mythos Preview will be available to participants at $25/$125 per million input/output tokens (participants can access the model on the Claude API, Amazon Bedrock, Google Cloud’s Vertex AI, and Microsoft Foundry).
          - paragraph [ref=e264]:
            - text: In addition to our commitment of model usage credits, we’ve donated $2.5M to Alpha-Omega and OpenSSF through the Linux Foundation, and $1.5M to the Apache Software Foundation to enable the maintainers of open-source software to respond to this changing landscape (maintainers interested in access can apply through the
            - link "Claude for Open Source" [ref=e265] [cursor=pointer]:
              - /url: https://claude.com/contact-sales/claude-for-oss
            - text: program).
          - paragraph [ref=e266]: "We intend for this work to grow in scope and continue for many months, and we’ll share as much as we can so that other organizations can apply the lessons to their own security. Partners will, to the extent they’re able, share information and best practices with each other; within 90 days, Anthropic will report publicly on what we’ve learned, as well as the vulnerabilities fixed and improvements made that can be disclosed. We will also collaborate with leading security organizations to produce a set of practical recommendations for how security practices should evolve in the AI era. This will potentially include:"
          - list [ref=e267]:
            - listitem [ref=e268]: Vulnerability disclosure processes;
            - listitem [ref=e269]: Software update processes;
            - listitem [ref=e270]: Open-source and supply-chain security;
            - listitem [ref=e271]: Software development lifecycle and secure-by-design practices;
            - listitem [ref=e272]: Standards for regulated industries;
            - listitem [ref=e273]: Triage scaling and automation; and
            - listitem [ref=e274]: Patching automation.
          - paragraph [ref=e275]: Anthropic has also been in ongoing discussions with US government officials about Claude Mythos Preview and its offensive and defensive cyber capabilities. As we noted above, securing critical infrastructure is a top national security priority for democratic countries—the emergence of these cyber capabilities is another reason why the US and its allies must maintain a decisive lead in AI technology. Governments have an essential role to play in helping maintain that lead, and in both assessing and mitigating the national security risks associated with AI models. We are ready to work with local, state, and federal representatives to assist in these tasks.
          - paragraph [ref=e276]: We are hopeful that Project Glasswing can seed a larger effort across industry and the public sector, with all parties helping to address the biggest questions around the impact of powerful models on security. We invite other AI industry members to join us in helping to set the standards for the industry. In the medium term, an independent, third-party body—one that can bring together private- and public-sector organizations—might be the ideal home for continued work on these large-scale cybersecurity projects.
      - generic [ref=e278]:
        - heading "APPENDIX" [level=2] [ref=e279]
        - list [ref=e281]:
          - listitem [ref=e282]:
            - text: The project is named for the glasswing butterfly,
            - link "Greta oto" [ref=e283] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/Greta_oto
              - emphasis [ref=e284]: Greta oto
            - text: ". The metaphor can be applied in two ways: the butterfly’s transparent wings let it hide in plain sight, much like the vulnerabilities discussed in this post; they also allow it to evade harm—like the transparency we’re advocating for in our approach."
          - listitem [ref=e285]: "From the Ancient Greek for “utterance” or “narrative”: the system of stories through which civilizations made sense of the world."
          - listitem [ref=e286]: Security professionals whose legitimate work is affected by these safeguards will be able to apply to an upcoming Cyber Verification Program.
