          - paragraph [ref=e102]:
            - text: Many flaws in software go unnoticed for years because finding and exploiting them has required expertise held by only a few skilled security experts. With the latest frontier AI models, the cost, effort, and level of expertise required to find and exploit software vulnerabilities have all dropped dramatically.
            - link "Over the past year" [ref=e103] [cursor=pointer]:
              - /url: https://www.anthropic.com/research/building-ai-cyber-defenders
            - text: ", AI models have become increasingly effective at reading and reasoning about code—in particular, they show a striking ability to spot"
            - link "vulnerabilities" [ref=e104] [cursor=pointer]:
              - /url: https://red.anthropic.com/2026/firefox/
            - text: and work out ways to
            - link "exploit" [ref=e105] [cursor=pointer]:
              - /url: https://red.anthropic.com/2026/exploit/
            - text: them. Claude Mythos Preview demonstrates a leap in these cyber skills—the vulnerabilities it has spotted have in some cases survived decades of human review and millions of automated security tests, and the exploits it develops are increasingly sophisticated.
          - paragraph [ref=e106]:
            - text: Ten years after the first
            - link "DARPA Cyber Grand Challenge" [ref=e107] [cursor=pointer]:
              - /url: https://www.darpa.mil/research/programs/cyber-grand-challenge
            - text: ", frontier AI models are now becoming competitive with the best humans at finding and exploiting vulnerabilities. Without the"
            - link "necessary safeguards" [ref=e108] [cursor=pointer]:
              - /url: https://openai.com/index/strengthening-cyber-resilience/
            - text: ", these powerful cyber capabilities could be used to exploit the many existing flaws in the world’s most important software. This could make cyberattacks of all kinds much more frequent and destructive, and empower adversaries of the United States and its allies. Addressing these issues is therefore an important security priority for democratic states."
          - paragraph [ref=e109]: "Although the risks from AI-augmented cyberattacks are serious, there is reason for optimism: the same capabilities that make AI models dangerous in the wrong hands make them invaluable for finding and fixing flaws in important software—and for producing new software with far fewer security bugs. Project Glasswing is an important step toward giving defenders a durable advantage in the coming AI-driven era of cybersecurity."
